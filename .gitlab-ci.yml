stages:
  - test
  - build
  - trigger-github
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Shared Docker image from weather-generation/docker-images
  SHARED_IMAGE: "$CI_REGISTRY/weather-generation/docker-images/python-3.13:latest"

.python_setup: &python_setup
  image: $SHARED_IMAGE
  before_script:
    - export PATH="/root/.local/bin:/app/.venv/bin:$PATH"
    # Upgrade pip and build tools
    - uv pip install --upgrade pip setuptools wheel

test-build:
  <<: *python_setup
  stage: test
  tags:
    - r9x
  script:
    # Install all dependencies from lock file
    - uv sync --group dev

    # Build core Cython extensions in-place
    - uv run python setup.py build_ext --inplace

    # Pre-generate Cython ufuncs
    - uv run python scripts/generate_ufuncs.py

    # Generate quick start example from README
    - mkdir -p src/weathercop/examples
    - pandoc README.org --lua-filter=$(pwd)/scripts/tangle.lua -f org -t plain

    # Build package
    - uv build

    # List built artifacts
    - ls -lh dist/

    # Install package with test dependencies
    - uv sync --group test
    - uv pip install dist/*.whl

    # Display system resources
    - echo "=== System resources before tests ==="
    - free -h
    - df -h
    - echo "==================================="

    # Run CPU-intensive tests
    - pytest --pyargs weathercop -n 10 -m "not memory_intensive" --durations=10 -v

    # Run memory-intensive tests
    - pytest --pyargs weathercop -n 4 -m "memory_intensive" --durations=10 -v
  only:
    - main
    - merge_requests
  except:
    variables:
      - $CI_COMMIT_MESSAGE =~ /\*\*\.md/
      - $CI_COMMIT_MESSAGE =~ /docs\//

build-wheels:
  <<: *python_setup
  stage: build
  tags:
    - r9x
  script:
    - uv sync
    - uv build --wheel
    - mkdir -p wheelhouse
    - mv dist/*.whl wheelhouse/
    - ls -lh wheelhouse/

    # Verify .nc test data file is packaged in wheel
    - |
      python << 'EOF'
      import zipfile
      from pathlib import Path

      wheels = list(Path('./wheelhouse').glob('*.whl'))
      if not wheels:
          print("✗ No wheels found in wheelhouse/")
          exit(1)

      for wheel in wheels:
          with zipfile.ZipFile(wheel, 'r') as zf:
              nc_files = [f for f in zf.namelist() if f.endswith('.nc')]
              if not nc_files:
                  print(f"✗ {wheel.name}: No .nc files found!")
                  print("Files in wheel:")
                  for f in sorted(zf.namelist()):
                      if 'fixtures' in f or 'tests' in f:
                          print(f"  - {f}")
                  exit(1)
              print(f"✓ {wheel.name}: Found {len(nc_files)} .nc file(s)")
              for nc in nc_files:
                  info = zf.getinfo(nc)
                  size_mb = info.file_size / (1024 * 1024)
                  print(f"  - {nc} ({size_mb:.2f} MB)")
      EOF

    - uv tool run twine check wheelhouse/*.whl
  artifacts:
    paths:
      - wheelhouse/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG != null'
    - when: manual
  allow_failure: true

build-sdist:
  <<: *python_setup
  stage: build
  tags:
    - r9x
  script:
    - uv sync
    - uv build --sdist
    - ls -lh dist/
  artifacts:
    paths:
      - dist/*.tar.gz
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG != null'
    - when: manual

trigger-github-builds:
  stage: trigger-github
  image: $SHARED_IMAGE
  tags:
    - r9x
  variables:
    GITHUB_TOKEN: $GITHUB_TOKEN
  before_script:
    - export PATH="/root/.local/bin:/app/.venv/bin:$PATH"
  script:
    # Install requests for GitHub API interaction
    - uv pip install requests

    # Trigger GitHub Actions workflow and wait for completion
    - |
      python << 'EOF'
      import requests
      import time
      import sys
      import os

      GITHUB_TOKEN = os.environ['GITHUB_TOKEN']
      GITHUB_REPO = "iskur/weathercop"  # Update with your repo
      WORKFLOW_ID = "build-wheels.yml"
      REF = os.environ['CI_COMMIT_TAG']

      headers = {
          'Authorization': f'token {GITHUB_TOKEN}',
          'Accept': 'application/vnd.github.v3+json',
      }

      # 1. Trigger workflow
      print(f"Triggering GitHub workflow for ref: {REF}")
      trigger_url = f"https://api.github.com/repos/{GITHUB_REPO}/actions/workflows/{WORKFLOW_ID}/dispatches"
      trigger_payload = {
          'ref': REF,
          'inputs': {'ref': REF}
      }
      response = requests.post(trigger_url, json=trigger_payload, headers=headers)

      if response.status_code != 204:
          print(f"Failed to trigger workflow: {response.status_code}")
          print(response.text)
          sys.exit(1)

      print("✓ Workflow triggered successfully")

      # 2. Wait for workflow to start (give it 30 seconds)
      time.sleep(30)

      # 3. Find the workflow run
      runs_url = f"https://api.github.com/repos/{GITHUB_REPO}/actions/workflows/{WORKFLOW_ID}/runs"
      params = {'branch': REF, 'per_page': 1}
      response = requests.get(runs_url, headers=headers, params=params)

      if response.status_code != 200:
          print(f"Failed to list workflow runs: {response.status_code}")
          sys.exit(1)

      runs = response.json()['workflow_runs']
      if not runs:
          print("No workflow runs found")
          sys.exit(1)

      run_id = runs[0]['id']
      run_url = runs[0]['html_url']
      print(f"Found workflow run: {run_url}")

      # 4. Poll for completion (timeout after 60 minutes)
      max_wait = 60 * 60  # 60 minutes
      poll_interval = 30  # Check every 30 seconds
      elapsed = 0

      while elapsed < max_wait:
          run_status_url = f"https://api.github.com/repos/{GITHUB_REPO}/actions/runs/{run_id}"
          response = requests.get(run_status_url, headers=headers)

          if response.status_code != 200:
              print(f"Failed to get run status: {response.status_code}")
              sys.exit(1)

          run_data = response.json()
          status = run_data['status']
          conclusion = run_data.get('conclusion')

          print(f"[{elapsed}s] Status: {status}, Conclusion: {conclusion}")

          if status == 'completed':
              if conclusion == 'success':
                  print("✓ GitHub workflow completed successfully")
                  sys.exit(0)
              else:
                  print(f"✗ GitHub workflow failed with conclusion: {conclusion}")
                  print(f"View details: {run_url}")
                  sys.exit(1)

          time.sleep(poll_interval)
          elapsed += poll_interval

      print(f"✗ Timeout: GitHub workflow did not complete within {max_wait}s")
      print(f"View status: {run_url}")
      sys.exit(1)
      EOF

  rules:
    - if: '$CI_COMMIT_TAG != null'
    - when: manual
  allow_failure: false

publish:
  image: $SHARED_IMAGE
  stage: publish
  needs:
    - build-wheels
    - build-sdist
    - optional: true
      job: trigger-github-builds
  tags:
    - r9x
  before_script:
    - export PATH="/root/.local/bin:/app/.venv/bin:$PATH"
  script:
    - mkdir -p dist
    - mv wheelhouse/*.whl dist/ || true
    - ls -lh dist/
    - uv tool run twine check dist/*.whl dist/*.tar.gz
    # Use --skip-existing to allow coordinated publishing from multiple CI systems
    # This enables GitLab to publish Linux wheels while GitHub publishes Windows/macOS wheels
    - uv tool run twine upload dist/*.whl dist/*.tar.gz --username __token__ --password $PYPI_TOKEN --skip-existing
  artifacts:
    paths:
      - dist/
  rules:
    - if: '$CI_COMMIT_TAG != null'
    - when: manual
  allow_failure: true
